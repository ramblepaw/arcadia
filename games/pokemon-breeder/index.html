<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Breeder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-required-screen" class="screen hidden">
  <div class="start-card">
    <a href="../../index.html" class="back-to-hub">&larr; Arcadia</a>
    <h1>Pokemon Breeder</h1>
    <p class="tagline">Build a ranch, breed real Pokemon, run a little zoo. Log in to keep a save.</p>
    <a href="../../login.html" class="btn">Log In</a>
  </div>
</div>

<div id="dex-not-ready-screen" class="screen hidden">
  <div class="start-card">
    <a href="../../index.html" class="back-to-hub">&larr; Arcadia</a>
    <h1>Pokemon Breeder</h1>
    <p class="tagline">Ranch data hasn't been generated on this server yet. Ask the admin to run the pokedex build script.</p>
  </div>
</div>

<div id="app" class="screen hidden">
  <header id="hud">
    <a href="../../index.html" class="back-to-hub">&larr; Arcadia</a>
    <div class="hud-stats">
      <span id="currency-badge" class="badge">0g</span>
      <span id="location-badge" class="badge"></span>
    </div>
  </header>

  <nav id="tabs">
    <button class="tab-btn active" data-tab="ranch">Ranch</button>
    <button class="tab-btn" data-tab="box">Box</button>
    <button class="tab-btn" data-tab="market">Market</button>
    <button class="tab-btn" data-tab="zoo">Zoo</button>
    <button class="tab-btn" data-tab="world">World</button>
  </nav>

  <main id="panels">
    <section id="panel-ranch" class="panel"></section>
    <section id="panel-box" class="panel hidden"></section>
    <section id="panel-market" class="panel hidden"></section>
    <section id="panel-zoo" class="panel hidden"></section>
    <section id="panel-world" class="panel hidden"></section>
  </main>

  <aside id="events-feed">
    <h3>Recent Events</h3>
    <ul id="events-list"></ul>
  </aside>
</div>

<div id="picker-modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="picker-title">Choose a Pokemon</h2>
    <div id="picker-list" class="picker-list"></div>
    <button id="picker-close-btn" class="btn secondary">Cancel</button>
  </div>
</div>

<div id="confirm-modal" class="modal hidden">
  <div class="modal-box">
    <p id="confirm-message"></p>
    <div class="build-pen-form">
      <button id="confirm-ok-btn" class="btn danger">Confirm</button>
      <button id="confirm-cancel-btn" class="btn secondary">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
