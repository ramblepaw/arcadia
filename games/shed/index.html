<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen" class="screen">
  <div class="start-card">
    <a href="../../index.html" class="back-to-hub">&larr; Arcadia</a>
    <h1>Shed</h1>
    <p class="tagline">aka Shithead, Palace, Karma. Empty your hand first - don't get stuck holding the pile.</p>
    <label for="bot-count">Number of AI opponents</label>
    <select id="bot-count">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
    <button id="start-btn">Deal Me In</button>
  </div>
</div>

<div id="swap-screen" class="screen hidden">
  <div class="start-card swap-card">
    <h1>Set Up Your Hand</h1>
    <p class="tagline">Click a hand card, then a face-up card, to swap them. Keep your strongest cards in hand.</p>
    <div class="swap-zone">
      <div class="zone-label">Hand</div>
      <div id="swap-hand" class="zone-row"></div>
    </div>
    <div class="swap-zone">
      <div class="zone-label">Face-Up</div>
      <div id="swap-faceup" class="zone-row"></div>
    </div>
    <div id="swap-status" class="player-status"></div>
    <button id="swap-ready-btn">Ready</button>
  </div>
</div>

<div id="game-screen" class="screen hidden">
  <header id="hud">
    <div class="hud-left">
      <div id="turn-info">Waiting...</div>
      <div id="requirement-info" class="requirement-badge"></div>
    </div>
    <div class="hud-right">
      <button id="main-menu-btn">Main Menu</button>
    </div>
  </header>

  <div id="opponents" class="opponents"></div>

  <div class="table-mid">
    <div class="piles">
      <div class="pile-wrap">
        <div id="draw-pile" class="pile stock"></div>
        <div class="pile-label">Draw</div>
      </div>
      <div class="pile-wrap">
        <div id="play-pile" class="pile discard"></div>
        <div class="pile-label">Pile</div>
      </div>
    </div>
    <div id="center-message" class="center-message"></div>
  </div>

  <div id="player-area" class="player-area">
    <div class="player-controls">
      <button id="play-btn" disabled>Play Selected</button>
      <button id="pickup-btn" disabled>Pick Up Pile</button>
    </div>
    <div class="zone-block">
      <div class="zone-label">Face-Down</div>
      <div id="player-facedown" class="zone-row"></div>
    </div>
    <div class="zone-block">
      <div class="zone-label">Face-Up</div>
      <div id="player-faceup" class="zone-row"></div>
    </div>
    <div class="zone-block">
      <div class="zone-label">Hand</div>
      <div id="player-hand" class="zone-row"></div>
    </div>
    <div id="player-status" class="player-status"></div>
  </div>
</div>

<div id="game-over-modal" class="modal hidden">
  <div class="modal-box">
    <h2>Game Over</h2>
    <div id="final-standings"></div>
    <div class="game-over-actions">
      <button id="play-again-btn">Play Again</button>
      <a href="../../index.html" class="btn secondary">Main Menu</a>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
