<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Arcadia</title>
<link rel="stylesheet" href="hub.css">
<link rel="stylesheet" href="account.css">
</head>
<body>

<header class="hub-header">
  <h1 id="profile-heading">Profile</h1>
</header>

<div class="account-nav"><a href="index.html">&larr; Back to Arcadia</a></div>

<main class="account-wrap">
  <div id="signed-out" class="account-card hidden">
    <p>You need to be logged in to view your profile.</p>
    <a class="btn" href="login.html?redirect=profile.html">Log in</a>
  </div>

  <div id="profile-content" class="hidden">
    <div class="account-card">
      <h2>Your Recent Games</h2>
      <div id="stats-table-wrap"><div class="empty-state">Loading...</div></div>
    </div>

    <div id="leaderboards"></div>

    <div class="account-card">
      <h2>Change Password</h2>
      <form id="change-password-form">
        <div class="field">
          <label for="current-password">Current Password</label>
          <input id="current-password" name="currentPassword" type="password" required autocomplete="current-password">
        </div>
        <div class="field">
          <label for="new-password">New Password</label>
          <input id="new-password" name="newPassword" type="password" required minlength="10" autocomplete="new-password">
        </div>
        <button type="submit">Change Password</button>
        <div id="change-password-message" class="form-message"></div>
      </form>
    </div>
  </div>
</main>

<script type="module" src="profile.js"></script>
</body>
</html>
