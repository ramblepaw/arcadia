services:
  arcadia:
    environment:
      ADMIN_PASSWORD: change-me-before-deploying
      ADMIN_USERNAME: admin
      TRUST_PROXY: 'true'
    image: ghcr.io/ramblepaw/arcadia:latest
    ports:
      - '8090:8090'
    pull_policy: always
    restart: unless-stopped
    user: '3000:3000'
    volumes:
      - /mnt/Main Store/Apps/Arcadia/data:/data
